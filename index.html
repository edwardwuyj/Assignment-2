<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubic Equation Solver</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Cubic Equation Solver</h1>
        <form id="cubic-form">
            <label for="a">Coefficient a:</label>
            <input type="number" id="a" name="a" required>
            <br>

            <label for="b">Coefficient b:</label>
            <input type="number" id="b" name="b" required>
            <br>

            <label for="c">Coefficient c:</label>
            <input type="number" id="c" name="c" required>
            <br>
            
            <label for="d">Coefficient d:</label>
            <input type="number" id="d" name="d" required>
            <br>

            <button type="submit">Solve</button>
        </form>
        <div id="solution">
            <table id="calculation-table">
                <thead>
                    <tr>
                        <th>Parameter</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>p</td>
                        <td id="p-value">-</td>
                    </tr>
                    <tr>
                        <td>q</td>
                        <td id="q-value">-</td>
                    </tr>
                    <tr>
                        <td>Discriminant</td>
                        <td id="discriminant-value">-</td>
                    </tr>
                    <tr>
                        <td>Root 1</td>
                        <td id="root1-value">-</td>
                    </tr>
                    <tr>
                        <td>Root 2</td>
                        <td id="root2-value">-</td>
                    </tr>
                    <tr>
                        <td>Root 3</td>
                        <td id="root3-value">-</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.ts"></script>
</body>

</html>
